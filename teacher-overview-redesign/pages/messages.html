<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TuteClass · Trao đổi</title>
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body>
<div class="teacher-app">
  <header class="topbar">
    <a href="../../index.html" class="brand">
      <img src="../../TuteLogo.png" alt="TuteClass" class="brand-logo" />
    </a>
    <nav class="hnav">
      <a href="overview.html" class="hic" data-page-link title="Trang chủ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
        <span>Trang chủ</span>
      </a>
      <a href="calendar.html" class="hic" data-page-link title="Lịch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Lịch</span>
      </a>
      <a href="#" class="hic" data-page-link title="Học viên">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Học viên</span>
      </a>
      <a href="homework.html" class="hic" data-page-link title="Bài tập">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        <span>Bài tập</span>
      </a>
      <a href="#" class="hic" data-page-link title="Báo cáo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>
        <span>Báo cáo</span>
      </a>
      <div class="search">
        <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="s-input" type="text" placeholder="Tìm học sinh, phụ huynh..." />
      </div>
    </nav>
    <div class="top-actions">
      <button class="icon-btn" type="button" title="Thông báo">
        <span class="dot"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
      <button class="profile" type="button" title="Tài khoản">
        <div class="avatar">NL</div>
        <div class="meta">
          <b>Cô Nguyễn Lan</b>
          <small>Giáo viên</small>
        </div>
        <span class="prof-chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>
      </button>
    </div>
  </header>

  <div class="main msg-main">
    <div class="msg-layout">
      <!-- Cột trái: danh sách hội thoại -->
      <aside class="msg-list-panel">
        <div class="msg-list-head">
          <button class="title-switch msg-class-switch" type="button" data-open-drawer title="Đổi lớp">
            <h2>Trao đổi lớp <b id="currentClass">Toán 9A</b></h2>
            <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>
          </button>
          <p class="msg-subject" id="msgSubject">Toán học</p>
        </div>
        <div class="msg-list-search">
          <div class="msg-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="msgSearchInput" placeholder="Tìm học sinh..." />
          </div>
          <button class="msg-filter-btn" type="button" title="Bộ lọc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          </button>
        </div>
        <div class="msg-list-toolbar">
          <span class="msg-list-label">Hội thoại</span>
          <div class="msg-list-toolbar-right">
            <button class="msg-link-btn" type="button">Chưa đọc</button>
            <button class="msg-icon-btn" type="button" title="Sắp xếp">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
            </button>
          </div>
        </div>
        <div class="msg-conv-list" id="msgConvList"></div>
      </aside>

      <!-- Cột giữa: chat -->
      <section class="msg-chat-panel" id="msgChatPanel">
        <header class="msg-chat-head" id="msgChatHead"></header>
        <div class="msg-chat-body" id="msgChatBody"></div>
        <div class="msg-quick-replies" id="msgQuickReplies"></div>
        <footer class="msg-compose">
          <button class="msg-compose-btn" type="button" title="Đính kèm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input class="msg-compose-input" type="text" id="msgComposeInput" placeholder="Nhập tin nhắn..." />
          <button class="msg-compose-btn" type="button" title="Emoji">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="msg-send-btn" type="button" id="msgSendBtn" title="Gửi">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
          </button>
        </footer>
      </section>

      <!-- Cột phải: thông tin học sinh -->
      <aside class="msg-info-panel" id="msgInfoPanel"></aside>
    </div>
  </div>

  <div class="dock-wrap">
    <svg class="dock-bg" viewBox="0 0 524 56" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <path d="M 56 0 L 468 0 A 26 26 0 0 1 494 26 A 30 30 0 0 0 524 56 L 0 56 A 30 30 0 0 0 30 26 A 26 26 0 0 1 56 0 Z" />
    </svg>
    <nav class="dock">
      <button class="dock-btn" type="button" data-dock-link="overview.html" title="Tổng quan" onclick="window.location.href='overview.html'">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg></span>
        <span>Tổng quan</span>
      </button>
      <button class="dock-btn" type="button" data-dock-link="calendar.html" title="Lịch dạy" onclick="window.location.href='calendar.html'">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
        <span>Lịch dạy</span>
      </button>
      <button class="dock-btn" type="button" title="Học viên">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span>Học viên</span>
      </button>
      <button class="dock-btn" type="button" title="Học phí">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20M6 15h4"/></svg></span>
        <span>Học phí</span>
      </button>
      <button class="dock-btn" type="button" data-dock-link="homework.html" title="Bài tập" onclick="window.location.href='homework.html'">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg></span>
        <span>Bài tập</span>
      </button>
      <button class="dock-btn" type="button" data-dock-link="materials.html" title="Tài liệu" onclick="window.location.href='materials.html'">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
        <span>Tài liệu</span>
      </button>
      <button class="dock-btn active" type="button" data-dock-link="messages.html" title="Trao đổi">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span>Trao đổi</span>
      </button>
      <button class="dock-btn" type="button" title="Trợ lý AI">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg></span>
        <span>Trợ lý AI</span>
      </button>
    </nav>
  </div>

  <div class="drawer-overlay" data-drawer-overlay></div>
  <aside class="drawer" data-class-drawer>
    <div class="drawer-head">
      <h3>Chọn lớp</h3>
      <button class="drawer-close" type="button" data-close-drawer>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="notes">
      <div class="note-tab paper-yellow active" onclick="selectClass(this)">
        <div class="cls">Toán 9A</div>
        <div class="tea">Cô Lan</div>
        <div class="meta">👥 30 học sinh · 36 buổi</div>
      </div>
      <div class="note-tab paper-blue" onclick="selectClass(this)">
        <div class="cls">Web Foundation K12</div>
        <div class="tea">Cô Lan</div>
        <div class="meta">👥 24 học sinh</div>
      </div>
      <div class="note-tab paper-pink" onclick="selectClass(this)">
        <div class="cls">Vật lý 9A</div>
        <div class="tea">Thầy Minh</div>
        <div class="meta">👥 28 học sinh</div>
      </div>
      <div class="note-tab paper-violet" onclick="selectClass(this)">
        <div class="cls">Ngữ văn 9A</div>
        <div class="tea">Cô Hoa</div>
        <div class="meta">👥 26 học sinh</div>
      </div>
    </div>
  </aside>
</div>

<script src="../scripts/app.js"></script>
<script src="../scripts/messages.js"></script>
</body>
</html>
