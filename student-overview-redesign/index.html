<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student redesign · Index</title>
  <link rel="stylesheet" href="./styles/pages.css" />
  <style>
    body { overflow: auto; }
    .index-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
    }
    .index-card {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .index-card img {
      height: 34px;
      margin-bottom: 18px;
    }
    .index-card h1 {
      font-size: 26px;
      margin-bottom: 8px;
    }
    .index-card p {
      color: var(--ink-soft);
      margin: 0 0 22px;
    }
    .index-links {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }
    .index-links a {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      color: var(--ink);
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }
    .index-links a:hover {
      border-color: var(--accent-soft);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .index-links .icon {
      width: 24px;
      height: 24px;
    }
    @media (max-width: 760px) {
      .index-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="index-wrap">
    <section class="index-card">
      <a href="../index.html" aria-label="Về trang chủ"><img src="../TuteLogo.png" alt="TuteClass" /></a>
      <h1>Student overview redesign</h1>
      <p>Preview đã được chia theo từng trang, CSS và script riêng để dễ kiểm soát.</p>
      <div class="index-links">
        <a href="./pages/overview.html"><span class="icon" data-icon="layout"></span><strong>Tổng quan</strong></a>
        <a href="./pages/schedule.html"><span class="icon" data-icon="calendar"></span><strong>Lịch học</strong></a>
        <a href="./pages/assignments.html"><span class="icon" data-icon="checklist"></span><strong>Bài tập</strong></a>
        <a href="./pages/resources.html"><span class="icon" data-icon="book"></span><strong>Tài liệu</strong></a>
        <a href="./pages/discussion.html"><span class="icon" data-icon="message"></span><strong>Trao đổi</strong></a>
      </div>
    </section>
  </main>
  <script src="./scripts/icons.js"></script>
</body>
</html>
